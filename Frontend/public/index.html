<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <title>UrbanNest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />

      (function() {
        try {
          var t = localStorage.getItem('un-theme') || 'light';
          document.documentElement.setAttribute('data-theme', t);
        } catch(e) {}
      })();
    </script>
  </head>

    <div id="root"></div>
